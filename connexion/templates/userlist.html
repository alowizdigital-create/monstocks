<!DOCTYPE html>
<html>
<head>
    <title>Liste des utilisateurs</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
        }

        .directeur { background: green; }
        .caissier { background: orange; }
        .vendeur { background: blue; }
    </style>
</head>
<body>

<h2>Liste des utilisateurs</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom d'utilisateur</th>
            <th>Rôle</th>
            <th>Entreprise</th>
        </tr>
    </thead>

    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>

            <td>
                <span class="badge {{ user.profile.role }}">
                    {{ user.profile.role }}
                </span>
            </td>

            <td>
                {{ user.profile.company.name }}
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Aucun utilisateur trouvé</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
